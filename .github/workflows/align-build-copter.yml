name: align build copter

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - 'dev/**'
      - main

concurrency:
  group: ci-${{github.workflow}}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ardupilot/ardupilot-dev-chibios:v0.1.3
    strategy:
      fail-fast: true
      matrix:
        board:
          # Copters
          - AP6-M460
          - AP6-M460-A10
          - AP6-M460-ds
          - AP6-M460-A10-ds
          - AP6-M460-can
          - AP6-M490
          - AP6-M490-A10
          - AP6-M490-ds
          - AP6-M490-A10-ds
          - AP6-M6T22
          - AP6-M4T12
          - AP6-M4P
          - AP6-M4P+
          - AP6-M450
          - AP6-M450-ds
          - AP6-M450-nogps-ds
          - AP6-M450-OF
          - AP6-M450-OF-ds
          - AP6-M450-A10-OF
          - AP6-M450-A10
          - AP6-M450-A10-ds
          - AP6-M450-A10-OF-ds
          - AP6-SoH
          - AP6m-M3
          - AP6m-M3-A10
          - AP6m-M3-OF
          - AP6m-MR25
          - AP6m-MR25-A10
          - AP6m-MR25-no-gps
          - AP3-M460
          - AP3-M490
          - AP5-M460
          - AP5-M490

          # Helis
          - AP6-E1
          - AP6-E1v2
          - AP6-E2
          - AP6-TB40-A10

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Prepare ccache timestamp
        id: ccache_cache_timestamp
        run: |
          NOW=$(date -u +"%F-%T")
          echo "timestamp=${NOW}" >> $GITHUB_OUTPUT
      - name: ccache cache files
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{github.workflow}}-ccache-${{steps.ccache_cache_timestamp.outputs.timestamp}}
          restore-keys: ${{github.workflow}}-ccache-
      - name: setup ccache
        run: |
          . .github/workflows/ccache.env

      - name: Build and package ${{ matrix.board }}
        shell: bash
        env:
          CPPFLAGS: ${{ startsWith(github.ref, 'refs/heads/dev') && '-DALIGN_DEV_VERSION' || '' }}
        run: |
          git config --global --add safe.directory ${GITHUB_WORKSPACE}
          export PATH="/usr/lib/ccache:/opt/gcc-arm-none-eabi-10/bin:/github/home/.local/bin:$PATH"

          python3 Tools/scripts/align_params_modifier.py

          # Validate defaults file exists
          if [ ! -f "libraries/AP_HAL_ChibiOS/hwdef/${{ matrix.board }}/defaults.parm" ]; then
            echo "❌ Error: default parameter file not found for ${{ matrix.board }}"
            exit 1
          fi

          # Build target depending on firmware type
          ./waf configure --board ${{ matrix.board }}
          ./waf clean
          case "${{ matrix.board }}" in
            AP6-E1|AP6-E1v2|AP6-E2|AP6-TB40-A10)
              ./waf heli
              cp build/${{ matrix.board }}/bin/arducopter-heli.apj ${{ matrix.board }}.apj
              ;;
            *)
              ./waf copter
              cp build/${{ matrix.board }}/bin/arducopter.apj ${{ matrix.board }}.apj
              ;;
          esac
          ccache -s
          ccache -z

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.board }}
          path: ${{ matrix.board }}.apj
  
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: checkout for release
        if: github.ref_type == 'tag'
        uses: actions/checkout@v6

      - name: create align-build dir
        run: mkdir -p align-build

      - name: download apj
        uses: actions/download-artifact@v7
        with:
          path: align-build
          merge-multiple: true

      - name: upload align-build
        uses: actions/upload-artifact@v7
        with:
          name: align-build-copter
          path: align-build

      - name: create release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          zip -r align-build.zip align-build
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated release for ${{ github.ref_name }}" \
            align-build/*.apj \
            align-build.zip \
            Tools/bootloaders/AP6m_bl.bin

      - name: cleanup
        if: always()
        run: |
          rm -rf align-build
